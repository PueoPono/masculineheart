<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Complete</title>
  <style>
    :root{--bg:#0d0a08;--panel:rgba(20,15,12,.82);--panelSoft:rgba(31,23,18,.56);--line:rgba(228,183,103,.18);--text:#f4eadc;--muted:rgba(244,234,220,.72);--gold:#efc578;--gold2:#dca453}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#0c0908,#17110f 60%,#0d0908);color:var(--text);line-height:1.6}
    .shell{width:min(880px,calc(100% - 32px));margin:0 auto;padding:44px 0 56px}.card{border:1px solid var(--line);border-radius:30px;background:var(--panel);padding:30px;box-shadow:0 24px 60px rgba(0,0,0,.34);text-align:center;position:relative;overflow:hidden}.card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top, rgba(239,197,120,.12), transparent 34%);pointer-events:none}
    .eyebrow{margin:0 0 10px;color:var(--gold);font-size:12px;letter-spacing:.16em;text-transform:uppercase}.title{margin:0 0 10px;font-size:clamp(2rem,4vw,3.2rem);line-height:1}.muted{color:var(--muted)}
    .sigil{width:88px;height:88px;border-radius:999px;margin:0 auto 18px;display:grid;place-items:center;background:linear-gradient(180deg,#efc578,#dca453);color:#2d1b10;font-size:34px;font-weight:800;box-shadow:0 14px 34px rgba(220,164,83,.24)}
    .quest-strip{display:grid;grid-template-columns:repeat(21,minmax(0,1fr));gap:8px;margin:22px 0}.node{height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(239,197,120,.08)}.node.done,.node.active{background:linear-gradient(180deg,#efc578,#dca453)}
    .timing{margin:22px auto 0;max-width:520px;padding:18px;border-radius:20px;border:1px solid rgba(239,197,120,.12);background:var(--panelSoft)}.timing strong{display:block;font-size:1.1rem;margin-bottom:6px}
    .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 16px;border-radius:999px;text-decoration:none;font-weight:700;border:1px solid var(--line)}.btn-primary{background:linear-gradient(180deg,#efc578,#dca453);color:#2d1b10;border:0}.btn-secondary{background:rgba(255,255,255,.04);color:var(--text)}
    @media (max-width:720px){.quest-strip{grid-template-columns:repeat(7,minmax(0,1fr))}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="sigil">✓</div>
      <p class="eyebrow">Quest Rhythm</p>
      <h1 class="title">Day complete.</h1>
      <p class="muted">You’ve taken the first step into the quest. Let it settle. Let it work on you a little.</p>

      <div class="quest-strip" aria-hidden="true">
        <div class="node done"></div><div class="node active"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div><div class="node"></div>
      </div>

      <div class="timing">
        <strong>Next lesson unlocks in 16 hours</strong>
        <div class="muted">Available tomorrow at 8:00 AM</div>
      </div>

      <div class="btn-row">
        <a class="btn btn-primary" href="index.html">Return to dashboard</a>
        <a class="btn btn-secondary" href="locked.html">View locked state</a>
      </div>
    </div>
  </div>
</body>
</html>
